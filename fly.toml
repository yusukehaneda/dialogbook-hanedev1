# fly.toml app configuration file generated for dialogbook-main-dev-billowing-haze-8597 on 2026-03-06T22:44:48+09:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'dialogbook-main-dev-billowing-haze-8597'
primary_region = 'nrt'
console_command = '/rails/bin/rails console'

[build]

[env]
  HTTP_PORT = "8080"

[deploy]
  release_command = "bin/rails db:migrate"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[http_service.checks]]
    grace_period = "60s"
    interval = "30s"
    timeout = "15s"
    method = "GET"
    path = "/up"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
